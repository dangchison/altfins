name: Altfins Scraper Cron

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual triggering from GitHub UI

# Prevent concurrent runs to avoid race conditions on DB inserts
concurrency:
  group: scrape-job
  cancel-in-progress: true

jobs:
  scrape-data:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip" # Cache pip dependencies to speed up runs

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ALTFINS_ACCOUNT: ${{ secrets.ALTFINS_ACCOUNT }}
          ALTFINS_PASSWORD: ${{ secrets.ALTFINS_PASSWORD }}
        run: python main.py
